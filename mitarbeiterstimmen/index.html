<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loading...</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      iframe { border: 0; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <iframe data-target="page64750211.html" src=""  loading="eager" referrerpolicy="no-referrer"></iframe>
  <script>
(function () {
  var iframe = document.querySelector('iframe[data-target]');
  if (!iframe) return;
  var target = iframe.getAttribute('data-target');
  var segs = (window.location.pathname || '/').split('/').filter(Boolean);
  var repoName = 'wamocon_homepage';
  var depth = segs.length - ((segs[0] || '') === repoName ? 1 : 0);
  var rel = '';
  for (var i = 0; i < depth; i++) { rel += '../'; }
  iframe.src = rel + target;
})();
</script>
</body></html>
